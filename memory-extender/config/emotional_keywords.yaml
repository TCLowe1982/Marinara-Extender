# Emotional Keyword Dictionaries
# Edit freely — changes take effect on the next pipeline call.
# Words are matched with word boundaries (\b) so "anger" won't match "danger".
# Multi-word phrases are supported: "don't care", "i hate".
# Keep entries lowercase; the classifier lowercases input before matching.

