# ── Dysregulation ─────────────────────────────────────────────────────────────
# Two sub-lists: deflection words (weak signal, low scoring, but boost when
# combined with attachment words) and direct dysregulation signals (scored normally).
# The classifier handles the deflection/attachment logic separately via config.

dysregulation:

  # Deflection words — contextual amplifiers.
  # Weak alone; combined with attachment_words they are strong dysregulation signals.
  deflection:
    - fine
    - i'm fine
    - it's fine
    - whatever
    - doesn't matter
    - it doesn't matter
    - don't care
    - i don't care
    - forget it
    - nevermind
    - never mind
    - forget i said anything
    - nothing
    - nothing's wrong
    - leave me alone
    - just go
    - go away
    - i'm okay
    - okay
    - i'll be fine

  # Attachment / boundary words — needed to trigger the combined boost.
  attachment:
    - leave
    - leaving
    - stay
    - staying
    - please stay
    - don't go
    - gone
    - you'll leave
    - you always leave
    - everyone leaves
    - abandon
    - abandoned
    - alone
    - all alone
    - by myself
    - need you to stay
    - want you to stay
    - please don't
    - don't leave me
    - you'll go
    - i need you
    - need you

  # Direct dysregulation signals — scored normally without needing the combined rule.
  direct:
    - losing control
    - out of control
    - can't control
    - losing it
    - falling apart
    - can't hold it together
    - spiraling
    - in a spiral
    - can't think straight
    - can't think
    - can't breathe
    - shutting down
    - shut down
    - going numb
    - numb
    - empty
    - hollow
    - nothing inside
    - dissociating
    - not real
    - isn't real
    - not here
    - not present
    - floating
    - watching myself
    - outside myself
    - this isn't happening
    - unraveling
    - breaking
    - breaking down
    - can't stop crying
    - can't stop
    - everything is too much
    - too much
    - overwhelmed
    - completely overwhelmed
    - don't know who i am
    - don't recognize myself
    - not myself
    - making it worse
    - self-destructive
    - hurting myself
    - hurt myself
