  # Core fear words
  - afraid
  - scared
  - terrified
  - terrifying
  - frightened
  - frightening
  - dread
  - dreading
  - panic
  - panicking
  - horror
  - horrified
  - nightmare
  - phobia
  # Anticipatory fear
  - what if
  - what happens if
  - going to happen
  - something bad
  - danger
  - dangerous
  - threat
  - threatening
  - unsafe
  - not safe
  # Protective / fleeing
  - run away
  - hide
  - escape
  - get away
  - protect
  - can't face
  - can't handle
  - can't deal
  # Anxiety flavor
  - worried
  - worrying
  - anxious
  - anxiety
  - nervous
  - on edge
  - uneasy
  - tense
  - hypervigilant

