# Marinara Extender — optional profile routing
#
# Copy this file to profiles.yaml (in the sidecar/ directory) and fill in the
# upstream base URLs you want to route to.  Profiles are completely optional —
# if this file doesn't exist the sidecar uses a single upstream as always.
#
# Once configured, create a Marinara connection per profile:
#   Provider:  Custom (OpenAI-compatible)
#   Base URL:  http://127.0.0.1:3001/p/<profile-name>
#   API Key:   your key for that provider
#   Model:     whatever model you use on that provider
#
# The profile name in the URL is matched to the key here (case-insensitive).

# OpenAI — default if no profile is used, but you can make it explicit too
openai: https://api.openai.com

# Anthropic (Claude) via an OpenAI-compatible wrapper
# anthropic: https://api.anthropic.com

# OpenRouter — routes to many providers via one API key
# openrouter: https://openrouter.ai/api

# Local Ollama
# local: http://127.0.0.1:11434

# Any custom endpoint
# myprovider: https://my-llm-proxy.example.com
